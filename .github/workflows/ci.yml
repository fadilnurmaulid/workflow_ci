name: MLflow CI

on:
  push:
    branches:
      - main

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Env
        run: |
          python --version
          pip --version
          pwd
          ls -la
          env

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0
          pip install pandas
          pip install numpy
          pip install scikit-learn==1.5.2

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager local

      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          python - << 'EOF'
          import os
          import glob

          runs = glob.glob("mlruns/*/*")
          if runs:
              latest = max(runs, key=os.path.getmtime)
              print("Latest Run ID:", os.path.basename(latest))
          else:
              print("No MLflow runs found")
          EOF